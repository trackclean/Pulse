name: Release Windows Build

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build Windows release
        run: npm run tauri build

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref }}" -replace "refs/tags/", ""
          $version = $tag -replace "^v", ""
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Generate latest.json (no signature)
        id: json
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          
          $latestJson = @{
            version = $version
            notes = "See release notes for details"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                url = "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/Pulse_${version}_x64-setup.exe"
              }
            }
          } | ConvertTo-Json -Depth 10
          
          $latestJson | Set-Content -Path "latest.json"
          Write-Host "Latest.json created successfully"
          Get-Content "latest.json"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Pulse ${{ steps.version.outputs.tag }} - Windows Release"
          draft: false
          prerelease: true
          overwrite: true
          files: |
            src-tauri/target/release/bundle/nsis/Pulse_${{ steps.version.outputs.version }}_x64-setup.exe
            latest.json
          body: |
            ## Pulse ${{ steps.version.outputs.tag }} - Windows Release
            
            ### What's included
            - Windows NSIS installer
            - Auto-update metadata (latest.json)
            
            ### Installation
            1. Download the `.exe` file below
            2. Run the installer and follow the prompts
            
            ### Testing
            - Drag and drop audio files to load them
            - Use the toolbar to edit metadata
            - Export to save your changes
            
            ### Feedback
            Found a bug? [Report an issue](https://github.com/${{ github.repository }}/issues/new)
            3. Launch Pulse from your Start Menu
            
            ### Testing Auto-Updates
            Users on v1.0.8 or earlier:
            1. Install this version
            2. In Settings → "Check for Updates"
            3. Auto-update will trigger for subsequent releases
            
            ### System Requirements
            - Windows 10 or later
            - 64-bit processor
            - ~200MB disk space
            - Internet connection (for auto-updates)
            
            ### File Verification
            - **MSI:** Main application installer
            - **MSI.sig:** Cryptographic signature for verification
            - **latest.json:** Auto-update metadata (auto-downloaded by app)
            
            ---
            
            **First Release Notes:**
            - Windows 64-bit native application
            - Drag & drop audio file support
            - Waveform visualization
            - Musical key detection
            - Manual BPM entry with auto-detection for samples < 2 minutes
            - Audio processing (silence removal, normalization)
            - File export with customizable naming
            - Category-based organization
            - All processing local (no internet required except for updates)
            
            Thank you for trying Pulse! Please report any issues on GitHub.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-build
          path: |
            src-tauri/target/release/Pulse_*.msi
            src-tauri/target/release/Pulse_*.msi.sig
            latest.json
          retention-days: 30
