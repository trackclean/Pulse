name: CI

on:
  pull_request:
  workflow_dispatch:
  # DISABLED for release: CI tests on main branch disabled until macOS/Linux builds ready
  # push:
  #   branches:
  #     - main
  #     - master

jobs:
  lint-build-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cargo Test
        run: cargo test
        working-directory: src-tauri

  aubio-bpm-check:
    name: Aubio BPM Check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install aubio-tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y aubio-tools

      - name: Install aubio (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install aubio

      - name: Run Aubio BPM Check
        run: node scripts/ci/aubio-bpm-check.mjs

  web-e2e:
    name: Web E2E (Chromium)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx playwright install --with-deps chromium

      - name: Install ffmpeg (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Playwright (macOS)
        if: matrix.os == 'macos-latest'
        run: npx playwright install chromium

      - name: Install ffmpeg (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install ffmpeg

      - name: Generate E2E Audio Fixtures
        env:
          GENERATE_NON_WAV: "1"
          E2E_LARGE_100_MB: "8"
          E2E_LARGE_500_MB: "32"
        run: |
          node scripts/generate-test-audio.mjs
          node scripts/ci/generate-wav-fixtures.mjs

      - name: Run Web E2E Tests
        run: npm run test:e2e
